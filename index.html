<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER ROULETTE!!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef08a;
    --pink: #f472b6;
    --blue: #38bdf8;
    --purple: #a78bfa;
    --orange: #fb923c;
    --green: #4ade80;
    --red: #f87171;
    --ink: #1e1b4b;
    --white: #ffffff;
    --shadow: rgba(30,27,75,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    padding: 30px 20px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(30,27,75,0.08) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -100%; left: -20%; width: 40%; height: 300%;
    background: rgba(255,255,255,0.2);
    transform: rotate(15deg);
    pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; width: min(480px, 100%); }

  h1 {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2.6rem, 9vw, 4.2rem);
    color: var(--ink);
    text-align: center;
    margin-bottom: 0; line-height: 1;
    -webkit-text-stroke: 3px var(--ink);
    paint-order: stroke fill;
    text-shadow: 4px 4px 0 var(--orange), 7px 7px 0 var(--blue);
  }
  .subtitle {
    text-align: center; font-size: 1rem; font-weight: 900;
    color: var(--ink); margin-bottom: 22px; letter-spacing: 0.1em;
    background: var(--orange); display: block; width: fit-content;
    padding: 3px 16px; border: 2px solid var(--ink);
    transform: rotate(-1deg); margin-left: auto; margin-right: auto;
    box-shadow: 3px 3px 0 var(--ink);
  }

  /* ── Machine card ── */
  .machine {
    background: var(--white);
    border: 3px solid var(--ink); border-radius: 16px;
    padding: 22px;
    box-shadow: 6px 6px 0 var(--ink);
    position: relative;
  }
  .machine::before {
    content: '★'; position: absolute; top: -18px; right: 24px;
    font-size: 2.2rem; color: var(--pink);
    -webkit-text-stroke: 2px var(--ink); transform: rotate(20deg);
    animation: wobble 2s ease-in-out infinite;
  }
  .machine::after {
    content: '✦'; position: absolute; top: -14px; left: 24px;
    font-size: 1.8rem; color: var(--blue);
    -webkit-text-stroke: 2px var(--ink); transform: rotate(-10deg);
    animation: wobble 2.5s ease-in-out infinite reverse;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(20deg) scale(1); }
    50% { transform: rotate(25deg) scale(1.1); }
  }

  /* ── Wheel area ── */
  .wheel-area {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 16px; position: relative;
  }

  .wheel-wrapper {
    position: relative; width: 360px; height: 360px;
    margin-bottom: 10px;
  }

  /* Pointer (arrow) */
  .wheel-pointer {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid #ffd700;
    z-index: 20;
    filter: drop-shadow(0 2px 4px rgba(255,215,0,0.6));
    transition: border-top-color 0.3s;
  }
  .wheel-pointer::after {
    content: '';
    position: absolute;
    top: -34px; left: -10px;
    width: 20px; height: 12px;
    background: #ffd700;
    border-radius: 4px 4px 0 0;
    transition: background 0.3s;
  }

  canvas#wheelCanvas {
    border: 4px solid var(--ink);
    border-radius: 50%;
    box-shadow: 5px 5px 0 var(--ink);
    display: block;
  }

  /* Center hub */
  .wheel-hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    background: var(--white);
    border: 3px solid var(--ink);
    border-radius: 50%;
    z-index: 15;
    box-shadow: 2px 2px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  /* ── Result display ── */
  .result-display {
    text-align: center; min-height: 54px;
    margin-bottom: 16px;
    font-family: 'Boogaloo', cursive;
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    background: var(--green);
    border: 3px solid var(--ink); border-radius: 10px;
    padding: 12px; box-shadow: 3px 3px 0 var(--ink);
    letter-spacing: 0.04em;
    position: relative; overflow: hidden;
  }
  .result-display::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--ink);
    transform: translateX(-102%);
    pointer-events: none; z-index: 2; border-radius: 8px;
  }
  .result-display.wipe::before {
    animation: inkWipe 0.42s cubic-bezier(0.77,0,0.18,1) forwards;
  }
  @keyframes inkWipe {
    0%   { transform: translateX(-102%); }
    45%  { transform: translateX(0%); }
    100% { transform: translateX(102%); }
  }
  .result-display .result-text { display: inline-block; }
  .result-display.pop .result-text {
    animation: resultBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.22s both;
  }
  @keyframes resultBounce {
    0%   { transform: scale(0.6) rotate(-4deg); opacity: 0; }
    55%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
    75%  { transform: scale(0.96) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ── Spin button ── */
  .spin-btn {
    width: 100%; padding: 16px;
    background: var(--pink);
    border: 3px solid var(--ink); border-radius: 10px;
    color: var(--ink); font-family: 'Boogaloo', cursive;
    font-size: 1.5rem; letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.1s;
    box-shadow: 4px 4px 0 var(--ink); margin-bottom: 18px;
  }
  .spin-btn:hover:not(:disabled) { background: var(--orange); transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .spin-btn:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--ink); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Casino result ── */
  .result-display.casino-result {
    gap: 12px;
  }
  .casino-color-dot {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  .casino-num {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: var(--ink);
    font-family: 'Boogaloo', cursive;
    letter-spacing: 0.05em;
  }
  .casino-color-name {
    font-size: 0.85rem; font-weight: 900;
    color: var(--ink);
    opacity: 0.7;
    letter-spacing: 0.1em;
  }
  .sub-controls {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px; flex-wrap: wrap;
  }
  .sub-toggle {
    display: flex; align-items: center; gap: 7px;
    cursor: pointer; user-select: none;
    font-family: 'Boogaloo', cursive; font-size: 0.82rem;
    color: var(--ink); letter-spacing: 0.03em;
    background: var(--bg); border: 2px solid var(--ink);
    border-radius: 20px; padding: 5px 12px 5px 7px;
    box-shadow: 2px 2px 0 var(--ink); transition: all 0.1s;
    flex-shrink: 0;
  }
  .sub-toggle:hover { background: #fde68a; }
  .sub-toggle-switch {
    width: 30px; height: 16px;
    background: rgba(30,27,75,0.15);
    border: 1.5px solid var(--ink); border-radius: 8px;
    position: relative; flex-shrink: 0; transition: background 0.2s;
  }
  .sub-toggle-switch::after {
    content: ''; position: absolute;
    top: 1px; left: 1px;
    width: 11px; height: 11px;
    background: var(--ink); border-radius: 50%;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sub-toggle.on .sub-toggle-switch { background: var(--green); }
  .sub-toggle.on .sub-toggle-switch::after { transform: translateX(14px); }

  .sub-casino-btn {
    background: var(--bg); border: 2px solid var(--ink);
    border-radius: 20px; color: var(--ink);
    font-family: 'Boogaloo', cursive; font-size: 0.82rem;
    padding: 5px 14px; cursor: pointer;
    box-shadow: 2px 2px 0 var(--ink); transition: all 0.1s;
    flex-shrink: 0;
  }
  .sub-casino-btn:hover { background: #fde68a; transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .sub-casino-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .sub-casino-btn.on { background: #0f1f0f; color: #ffd700; border-color: #ffd700; box-shadow: 2px 2px 0 #8b6914; }

  /* ── Editor ── */
  .editor {
    background: var(--bg); border: 2px solid var(--ink);
    border-radius: 10px; padding: 16px; box-shadow: 3px 3px 0 var(--ink);
  }
  .editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .editor-title { font-family: 'Boogaloo', cursive; font-size: 1rem; color: var(--ink); letter-spacing: 0.06em; }
  .items-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 36px; }
  .item-tag {
    display: flex; align-items: center; gap: 4px;
    background: var(--blue); border: 2px solid var(--ink); border-radius: 20px;
    padding: 4px 10px; font-size: 0.88rem; font-weight: 700; color: var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    animation: tagPop 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes tagPop { from { opacity:0; transform:scale(0.5) rotate(-10deg); } to { opacity:1; transform:scale(1) rotate(0deg); } }
  .item-tag button { background: none; border: none; color: var(--ink); cursor: pointer; font-size: 0.85rem; font-weight: 900; line-height: 1; padding: 0; transition: transform 0.15s; }
  .item-tag button:hover { transform: scale(1.3); }
  @keyframes tagRemove {
    0%   { transform: scale(1) rotate(0deg); opacity: 1; max-width: 200px; padding: 4px 10px; }
    40%  { transform: scale(1.25) rotate(-10deg); opacity: 0.9; }
    100% { transform: scale(0) rotate(20deg); opacity: 0; max-width: 0; padding: 0; border-width: 0; }
  }
  .item-tag.removing { animation: tagRemove 0.38s cubic-bezier(0.55,0,1,0.45) forwards; overflow: hidden; }

  .add-row { display: flex; gap: 8px; }
  .add-input {
    flex: 1; background: var(--white); border: 2px solid var(--ink); border-radius: 8px;
    padding: 9px 12px; color: var(--ink); font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 700; outline: none; transition: box-shadow 0.15s;
    resize: none; min-height: 40px; max-height: 110px; line-height: 1.5;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .add-input:focus { box-shadow: 3px 3px 0 var(--purple); border-color: var(--purple); }
  .add-input::placeholder { color: rgba(30,27,75,0.3); font-weight: 400; }
  .add-btn {
    background: var(--purple); border: 2px solid var(--ink); border-radius: 8px;
    color: var(--white); font-family: 'Boogaloo', cursive; font-size: 1rem;
    padding: 9px 14px; cursor: pointer; transition: all 0.1s; flex-shrink: 0;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .add-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .add-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .clear-btn {
    background: none; border: 2px solid var(--ink); border-radius: 6px;
    color: var(--ink); font-family: 'Boogaloo', cursive; font-size: 0.8rem;
    padding: 3px 10px; cursor: pointer; transition: all 0.1s; box-shadow: 2px 2px 0 var(--ink);
  }
  .clear-btn:hover { background: var(--bg); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .hint { font-size: 0.7rem; color: rgba(30,27,75,0.45); margin-top: 7px; font-weight: 700; }

  /* ── Flash ── */
  @keyframes machineFlash {
    0%,100% { box-shadow: 6px 6px 0 var(--ink); }
    40% { box-shadow: 6px 6px 0 var(--orange), 0 0 30px rgba(251,146,60,0.5); background: #fff9c4; }
  }
  .machine.flash { animation: machineFlash 0.25s ease 4; }

  /* ── History panel ── */
  .history-panel {
    margin-top: 20px; background: var(--white);
    border: 3px solid var(--ink); border-radius: 16px;
    padding: 18px 20px; box-shadow: 6px 6px 0 var(--ink); display: none;
  }
  .history-panel.visible { display: block; }
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .history-title { font-family: 'Boogaloo', cursive; font-size: 1.1rem; color: var(--ink); letter-spacing: 0.05em; }
  .history-clear {
    background: none; border: 2px solid var(--ink); border-radius: 6px; color: var(--ink);
    font-family: 'Boogaloo', cursive; font-size: 0.8rem; padding: 3px 10px;
    cursor: pointer; transition: all 0.1s; box-shadow: 2px 2px 0 var(--ink);
  }
  .history-clear:hover { background: var(--bg); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
  .history-clear:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--bg);
    border: 2px solid var(--ink); border-radius: 8px; box-shadow: 2px 2px 0 var(--ink);
    animation: historyIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes historyIn { from { opacity:0; transform:translateY(-10px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
  .history-num { font-family: 'Boogaloo', cursive; font-size: 0.85rem; color: var(--ink); opacity: 0.4; min-width: 22px; text-align: right; flex-shrink: 0; }
  .history-value { font-family: 'Boogaloo', cursive; font-size: 1.05rem; color: var(--ink); letter-spacing: 0.02em; flex: 1; }
  .history-badge { font-size: 0.7rem; font-weight: 900; background: var(--pink); border: 1.5px solid var(--ink); border-radius: 4px; padding: 1px 6px; color: var(--ink); flex-shrink: 0; }
  .history-item:first-child .history-badge { background: var(--green); }

  /* ── Analysis panel ── */
  .analysis-panel {
    margin-top: 16px; background: var(--white);
    border: 3px solid var(--ink); border-radius: 16px;
    padding: 18px 20px; box-shadow: 6px 6px 0 var(--ink); display: none;
  }
  .analysis-panel.visible { display: block; }
  .analysis-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .analysis-title { font-family: 'Boogaloo', cursive; font-size: 1.1rem; color: var(--ink); letter-spacing: 0.05em; }
  .analysis-verdict {
    font-family: 'Boogaloo', cursive; font-size: 0.95rem;
    padding: 8px 14px; border: 2px solid var(--ink); border-radius: 8px;
    box-shadow: 2px 2px 0 var(--ink); margin-bottom: 14px; text-align: center; letter-spacing: 0.04em;
  }
  .analysis-verdict.fair   { background: var(--green); }
  .analysis-verdict.slight { background: var(--bg); }
  .analysis-verdict.biased { background: var(--pink); }
  .analysis-note { font-size: 0.72rem; font-weight: 700; color: rgba(30,27,75,0.45); margin-bottom: 12px; text-align: center; }
  .bar-list { display: flex; flex-direction: column; gap: 7px; }
  .bar-row { display: grid; grid-template-columns: 90px 1fr 36px; align-items: center; gap: 8px; }
  .bar-label { font-family: 'Boogaloo', cursive; font-size: 0.95rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { background: var(--bg); border: 2px solid var(--ink); border-radius: 4px; height: 20px; position: relative; overflow: hidden; }
  .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 2px; transition: width 0.5s cubic-bezier(0.34,1.2,0.64,1); }
  .bar-fill.high { background: var(--pink); }
  .bar-fill.mid  { background: var(--blue); }
  .bar-fill.low  { background: var(--bg); border-right: 2px solid var(--ink); }
  .bar-expected { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--ink); opacity: 0.4; }
  .bar-count { font-family: 'Boogaloo', cursive; font-size: 0.9rem; color: var(--ink); text-align: right; }
  .analysis-stats { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-chip { background: var(--bg); border: 2px solid var(--ink); border-radius: 6px; padding: 4px 10px; font-family: 'Boogaloo', cursive; font-size: 0.82rem; color: var(--ink); box-shadow: 2px 2px 0 var(--ink); }
  /* ── Footer links ── */
  .footer-links {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 20px; flex-wrap: wrap;
  }
  .footer-link {
    font-family: 'Boogaloo', cursive; font-size: 0.9rem;
    color: var(--ink); text-decoration: none;
    background: var(--white); border: 2px solid var(--ink);
    border-radius: 20px; padding: 7px 18px;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.1s; letter-spacing: 0.05em;
  }
  .footer-link:hover { background: var(--bg); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .footer-link:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .footer-link.active { background: var(--pink); }
</style>
</head>
<body>
<div class="page">
  <h1>SUPER ROULETTE!!</h1>
  <p class="subtitle">🎯 ランダム選択マシン 🎯</p>

  <div class="machine" id="machine">
    <!-- Wheel -->
    <div class="wheel-area">
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <canvas id="wheelCanvas" width="360" height="360"></canvas>
        <div class="wheel-hub">🎯</div>
      </div>
    </div>

    <div class="result-display" id="result"><span class="result-text">👉 スピンして決めよう！</span></div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 GO!! 🎰</button>

    <div class="editor" id="editorSection">
      <div class="editor-header">
        <div class="editor-title">📋 選択肢リスト</div>
        <button class="clear-btn" onclick="clearItems()">全削除</button>
      </div>
      <div class="items-container" id="tagsContainer"></div>
      <div class="add-row">
        <textarea class="add-input" id="addInput" placeholder="選択肢を入力…&#10;複数行でまとめて追加OK!" rows="1"></textarea>
        <button class="add-btn" onclick="addItem()">追加!</button>
      </div>
      <p class="hint">Enter=追加 / Shift+Enter=改行 / 複数行まとめてOK</p>
    </div>

    <!-- Compact sub-controls -->
    <div class="sub-controls">
      <div class="sub-toggle" id="toggleRow" onclick="toggleAutoRemove()">
        <div class="sub-toggle-switch"></div>
        <span>選ばれたら消す</span>
      </div>
      <button class="sub-casino-btn" id="casinoBtn" onclick="toggleCasinoMode()">🎰 カジノモード</button>
    </div>
  </div>

  <!-- History panel -->
  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <span class="history-title">📜 結果一覧</span>
      <button class="history-clear" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Analysis panel -->
  <div class="analysis-panel" id="analysisPanel">
    <div class="analysis-header">
      <span class="analysis-title">📊 偏り分析</span>
    </div>
    <div class="analysis-verdict" id="analysisVerdict"></div>
    <div class="analysis-note" id="analysisNote"></div>
    <div class="bar-list" id="barList"></div>
    <div class="analysis-stats" id="analysisStats"></div>
  </div>

  <!-- Footer links -->
  <div class="footer-links">
    <a class="footer-link active" href="https://nineshift.github.io/SUPER-ROULETTE/" target="_blank">🎡 ルーレット</a>
    <a class="footer-link" href="https://nineshift.github.io/SUPER-SLOT/" target="_blank">🎰 スロット</a>
  </div>

</div>

<script>
// ── Palette for wheel slices ──
const SLICE_COLORS = [
  '#f472b6','#38bdf8','#4ade80','#fb923c','#a78bfa',
  '#f87171','#fbbf24','#34d399','#60a5fa','#e879f9',
  '#f97316','#22d3ee','#84cc16','#f43f5e','#818cf8',
];

// ── European roulette: order of numbers on wheel, with official red/black/green ──
const CASINO_ORDER = [
  0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26
];
const CASINO_COLORS = (() => {
  const red = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  return CASINO_ORDER.map(n => n === 0 ? '#16a34a' : red.has(n) ? '#dc2626' : '#1c1c1c');
})();

let casinoMode = false;
let savedItems = null;

function toggleCasinoMode() {
  casinoMode = !casinoMode;
  const btn = document.getElementById('casinoBtn');
  const editor = document.getElementById('editorSection');

  if(casinoMode) {
    savedItems = [...items];
    items = CASINO_ORDER.map(String);
    btn.textContent = '🎲 カスタムモード';
    btn.classList.add('on');
    editor.style.display = 'none';
    document.getElementById('toggleRow').style.display = 'none';
    document.querySelector('.wheel-wrapper').classList.add('casino-pointer-active');
  } else {
    items = savedItems || [];
    btn.textContent = '🎰 カジノモード';
    btn.classList.remove('on');
    editor.style.display = '';
    document.getElementById('toggleRow').style.display = '';
    document.querySelector('.wheel-wrapper').classList.remove('casino-pointer-active');
  }
  pendingRemoval = null;
  currentAngle = Math.random() * Math.PI * 2;
  // Reset result display
  const resultEl = document.getElementById('result');
  const textEl = resultEl.querySelector('.result-text');
  resultEl.classList.remove('casino-result','pop','wipe');
  textEl.innerHTML = '👉 スピンして決めよう！';
  renderTags();
}

let items = ['りんご','ばなな','ぶどう','メロン','いちご','もも','みかん','キウイ'];
let spinning = false;
let autoRemove = false;
let history = [];
let pendingRemoval = null;
let currentAngle = 0; // radians, top of canvas = -π/2

// ── Audio ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, type, dur, vol=0.18, t=AC.currentTime) {
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
function playTick()   { beep(380,'square',0.04,0.08); }
function playResult() {
  const t=AC.currentTime;
  beep(523,'square',0.07,0.18,t);
  beep(659,'square',0.07,0.18,t+0.08);
  beep(784,'square',0.07,0.18,t+0.16);
  beep(1047,'sine',0.25,0.22,t+0.24);
}

let tickInterval = null;
function startTicks() { /* ticks now driven by animation frame boundary crossings */ }
function stopTicks()  { clearInterval(tickInterval); tickInterval = null; }

// ── Draw wheel ──
function drawWheel(angle) {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const cx = 180, cy = 180, r = 175;
  const n = items.length;
  ctx.clearRect(0,0,300,300);

  if(n === 0) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#e5e7eb'; ctx.fill();
    ctx.strokeStyle='#1e1b4b'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='#1e1b4b'; ctx.font='bold 16px Boogaloo,cursive';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('選択肢を追加してね', cx, cy);
    return;
  }

  const sliceAngle = (Math.PI * 2) / n;

  for(let i = 0; i < n; i++) {
    const start = angle + i * sliceAngle - Math.PI/2;
    const end   = start + sliceAngle;
    const color = casinoMode ? CASINO_COLORS[i] : SLICE_COLORS[i % SLICE_COLORS.length];

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#1e1b4b';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Text — casino mode: push to outer edge; normal: slightly outer
    const textAngle = start + sliceAngle / 2;
    const textR = casinoMode ? r * 0.82 : r * 0.68;
    const tx = cx + Math.cos(textAngle) * textR;
    const ty = cy + Math.sin(textAngle) * textR;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(textAngle + Math.PI / 2);

    const label = items[i];
    const maxLen = 7;
    const display = label.length > maxLen ? label.slice(0, maxLen-1) + '…' : label;

    // Dynamic font size — casino mode gets larger since numbers are short
    const fontSize = casinoMode ? 13 : n <= 6 ? 16 : n <= 10 ? 13 : n <= 16 ? 11 : 9;
    ctx.font = `900 ${fontSize}px 'Boogaloo', cursive`;
    ctx.fillStyle = casinoMode ? '#ffffff' : '#1e1b4b';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Text shadow
    ctx.shadowColor = casinoMode ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.7)';
    ctx.shadowBlur = 3;
    ctx.fillText(display, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#1e1b4b'; ctx.lineWidth=4; ctx.stroke();
}

// ── Items ──
function renderTags() {
  const c = document.getElementById('tagsContainer');
  c.innerHTML = '';
  items.forEach((item,i) => {
    const tag = document.createElement('div');
    tag.className = 'item-tag';
    tag.innerHTML = `<span>${item}</span><button onclick="removeItem(${i})">✕</button>`;
    c.appendChild(tag);
  });
  drawWheel(currentAngle);
}

function addItem() {
  const input = document.getElementById('addInput');
  const vals = input.value.split('\n').map(v=>v.trim()).filter(v=>v.length>0);
  if(!vals.length || spinning) return;
  vals.forEach(v => items.push(v));
  input.value=''; input.style.height='auto';
  renderTags();
}

function removeItem(i) {
  if(spinning) return;
  items.splice(i,1);
  renderTags();
}

function clearItems() {
  if(spinning) return;
  items=[];
  pendingRemoval=null;
  renderTags();
}

document.getElementById('addInput').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addItem();}
});
document.getElementById('addInput').addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});

// ── Toggle ──
function toggleAutoRemove() {
  autoRemove = !autoRemove;
  if(!autoRemove) pendingRemoval = null;
  document.getElementById('toggleRow').classList.toggle('on', autoRemove);
}

// ── Spin ──
function spin() {
  if(spinning) return;

  // Remove pending item synchronously before spin
  if(autoRemove && pendingRemoval !== null) {
    const idx = items.indexOf(pendingRemoval);
    if(idx !== -1) {
      const tags = document.querySelectorAll('#tagsContainer .item-tag');
      if(tags[idx]) tags[idx].classList.add('removing');
      items.splice(idx, 1);
      setTimeout(()=>renderTags(), 380);
    }
    pendingRemoval = null;
  }

  if(items.length < 2) { alert('選択肢を2つ以上追加してください'); return; }
  if(AC.state==='suspended') AC.resume();
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const resultEl = document.getElementById('result');
  const textEl = resultEl.querySelector('.result-text');
  resultEl.classList.remove('pop','wipe','casino-result');
  textEl.innerHTML = '🌀 スピン中...!!';

  // Snapshot items at spin start so async ops don't affect the result
  const snapItems = [...items];
  const n = snapItems.length;
  const targetIdx = Math.floor(Math.random() * n);
  const targetText = snapItems[targetIdx];

  const sliceAngle = (Math.PI * 2) / n;

  // Target angle: pointer is at top (angle = -π/2 from canvas 0)
  // Wheel slice i occupies [currentAngle - π/2 + i*sliceAngle, ... + sliceAngle]
  // We want the center of targetIdx's slice to align with pointer (-π/2)
  // So: endAngle - π/2 + targetIdx*sliceAngle + sliceAngle/2 ≡ -π/2  (mod 2π)
  // → endAngle ≡ -targetIdx*sliceAngle - sliceAngle/2  (mod 2π)
  const jitter = (Math.random() - 0.5) * sliceAngle * 0.55;
  const targetRemainder = (-(targetIdx * sliceAngle + sliceAngle / 2) + jitter + Math.PI * 2 * 100) % (Math.PI * 2);

  // Normalise current angle to [0, 2π)
  const normCurrent = ((currentAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const delta = (targetRemainder - normCurrent + Math.PI*2) % (Math.PI*2);

  // Add 10–13 full rotations for a satisfying spin matching casino mode feel
  const extraSpins = (10 + Math.floor(Math.random() * 4)) * Math.PI * 2;
  const totalRotation = extraSpins + delta;

  const startAngle = currentAngle;
  const endAngle = startAngle + totalRotation;

  // Derive duration from totalRotation so peak speed stays constant
  // regardless of how many rotations are added.
  const BASE_SPEED = 12;
  const duration = (totalRotation / BASE_SPEED) * 1000 * 1.5 + 3000;
  const startTime = performance.now();

  startTicks();

  // Track ticks by total angle travelled (avoids modulo jump issues)
  let lastTickRotation = 0;

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Smooth cubic bezier: fast ramp, long plateau, gradual stop — no discontinuities
    // Control points chosen so derivative (speed) is continuous throughout
    // Equivalent to CSS cubic-bezier(0.2, 0, 0.1, 1) solved via Newton's method
    const eased = cubicBezierEase(t, 0.15, 0.0, 0.1, 1.0);
    currentAngle = startAngle + totalRotation * eased;

    drawWheel(currentAngle);

    // Tick every time we pass a slice boundary — track via cumulative rotation
    const rotated = currentAngle - startAngle;
    const ticksPassed = Math.floor(rotated / sliceAngle);
    if(ticksPassed * sliceAngle > lastTickRotation) {
      playTick();
      lastTickRotation = ticksPassed * sliceAngle;
    }

    if(t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = endAngle;
      drawWheel(currentAngle);
      stopTicks();
      onDone(targetText);
    }
  }

  requestAnimationFrame(animate);
}

// ── History / analysis ──
function addHistory(result) {
  history.unshift(result);
  const panel = document.getElementById('historyPanel');
  const list  = document.getElementById('historyList');
  panel.classList.add('visible');
  list.innerHTML = '';
  history.forEach((val,i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    // In casino mode, show color dot + color name alongside number
    let valueHtml;
    if(casinoMode || /^\d+$/.test(val) && CASINO_ORDER.includes(parseInt(val))) {
      const num = parseInt(val);
      const idx = CASINO_ORDER.indexOf(num);
      if(idx !== -1) {
        const color = CASINO_COLORS[idx];
        const colorName = num === 0 ? 'グリーン' : color === '#dc2626' ? 'レッド' : 'ブラック';
        valueHtml = `<span style="display:inline-flex;align-items:center;gap:6px;">
          <span style="width:12px;height:12px;border-radius:50%;background:${color};border:1.5px solid rgba(0,0,0,0.2);flex-shrink:0;"></span>
          <span>${val}</span>
          <span style="font-size:0.75rem;opacity:0.55;">${colorName}</span>
        </span>`;
      } else {
        valueHtml = val;
      }
    } else {
      valueHtml = val;
    }
    item.innerHTML = `
      <span class="history-num">${history.length-i}</span>
      <span class="history-value">${valueHtml}</span>
      <span class="history-badge">${i===0?'最新':`${i+1}回前`}</span>`;
    list.appendChild(item);
  });
  updateAnalysis();
}

function clearHistory() {
  history=[];
  document.getElementById('historyPanel').classList.remove('visible');
  document.getElementById('historyList').innerHTML='';
  document.getElementById('analysisPanel').classList.remove('visible');
}

function updateAnalysis() {
  const n = history.length;
  if(n < 5) { document.getElementById('analysisPanel').classList.remove('visible'); return; }
  const allKeys = [...new Set([...items,...history])];
  const counts = {}; allKeys.forEach(k=>counts[k]=0);
  history.forEach(v=>{ if(counts[v]!==undefined) counts[v]++; });
  const k = allKeys.length, expected = n/k;
  let chi2=0; allKeys.forEach(key=>{ const d=counts[key]-expected; chi2+=d*d/expected; });
  const df=k-1, p=1-chi2cdf(chi2,df);
  const panel=document.getElementById('analysisPanel');
  const verdict=document.getElementById('analysisVerdict');
  const note=document.getElementById('analysisNote');
  panel.classList.add('visible');
  let vc,vt;
  if(p>0.1){vc='fair';vt='✅ 偏りなし — 均等に選ばれています';}
  else if(p>0.05){vc='slight';vt='🤔 やや偏りあり — 注意レベル';}
  else{vc='biased';vt='⚠️ 偏りあり — 統計的に有意';}
  verdict.className='analysis-verdict '+vc; verdict.textContent=vt;
  note.textContent=`χ²=${chi2.toFixed(2)}  df=${df}  p=${p<0.001?'<0.001':p.toFixed(3)}  試行数=${n}回`;
  const maxC=Math.max(...allKeys.map(k=>counts[k]),1);
  const sorted=[...allKeys].sort((a,b)=>counts[b]-counts[a]);
  const barList=document.getElementById('barList');
  barList.innerHTML='';
  sorted.forEach(key=>{
    const cnt=counts[key], pct=(cnt/maxC)*100, expPct=(expected/maxC)*100;
    const ratio=cnt/expected, fc=ratio>1.3?'high':ratio<0.7?'low':'mid';
    const row=document.createElement('div'); row.className='bar-row';
    row.innerHTML=`<span class="bar-label" title="${key}">${key}</span><div class="bar-track"><div class="bar-fill ${fc}" style="width:${pct}%"></div><div class="bar-expected" style="left:${expPct}%"></div></div><span class="bar-count">${cnt}</span>`;
    barList.appendChild(row);
  });
  const most=sorted[0],least=sorted[sorted.length-1];
  document.getElementById('analysisStats').innerHTML=`<span class="stat-chip">🔝 最多: ${most} (${counts[most]}回)</span><span class="stat-chip">📉 最少: ${least} (${counts[least]}回)</span><span class="stat-chip">📐 期待値: ${expected.toFixed(1)}回</span>`;
}

function onDone(result) {
  spinning=false;
  document.getElementById('spinBtn').disabled=false;
  playResult();
  const resultEl=document.getElementById('result');
  const textEl=resultEl.querySelector('.result-text');

  if(casinoMode) {
    const num = parseInt(result);
    const idx = CASINO_ORDER.indexOf(num);
    const color = CASINO_COLORS[idx];
    const colorName = num === 0 ? 'グリーン' : color === '#dc2626' ? 'レッド' : 'ブラック';
    resultEl.classList.add('casino-result');
    textEl.innerHTML = `
      <span class="casino-color-dot" style="background:${color}"></span>
      <span class="casino-num">${result}</span>
      <span class="casino-color-name">${colorName}</span>
    `;
  } else {
    resultEl.classList.remove('casino-result');
    textEl.textContent=`🎉 ${result} に決定!!`;
  }

  resultEl.classList.remove('pop','wipe'); void resultEl.offsetWidth;
  resultEl.classList.add('wipe','pop');
  const machine=document.getElementById('machine');
  machine.classList.remove('flash'); void machine.offsetWidth;
  machine.classList.add('flash');
  setTimeout(()=>machine.classList.remove('flash'),1100);
  addHistory(result);
  if(autoRemove) pendingRemoval=result;
}

// ── Cubic bezier easing (CSS-compatible, Newton's method solver) ──
function cubicBezierEase(t, x1, y1, x2, y2) {
  // Solve for the bezier parameter u such that bezierX(u) == t, then return bezierY(u)
  function bezierX(u) { return 3*u*(1-u)*(1-u)*x1 + 3*u*u*(1-u)*x2 + u*u*u; }
  function bezierY(u) { return 3*u*(1-u)*(1-u)*y1 + 3*u*u*(1-u)*y2 + u*u*u; }
  function bezierXd(u){ return 3*(1-u)*(1-u)*x1 + 6*u*(1-u)*(x2-x1) + 3*u*u*(1-x2); }
  if(t <= 0) return 0;
  if(t >= 1) return 1;
  let u = t;
  for(let i = 0; i < 8; i++) {
    const err = bezierX(u) - t;
    if(Math.abs(err) < 1e-6) break;
    u -= err / (bezierXd(u) || 1e-6);
    u = Math.max(0, Math.min(1, u));
  }
  return bezierY(u);
}

// ── Chi-square helpers ──
function chi2cdf(x,df){if(x<=0)return 0;return gammainc(x/2,df/2);}
function gammainc(x,a){if(x<0||a<=0)return 0;if(x===0)return 0;let sum=1,term=1;for(let i=1;i<200;i++){term*=x/(a+i);sum+=term;if(Math.abs(term)<1e-8)break;}return Math.min(1,sum*Math.exp(-x+a*Math.log(x)-lgamma(a+1)));}
function lgamma(z){const c=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];let y=z,tmp=z+5.5;tmp-=(z+0.5)*Math.log(tmp);let ser=1.000000000190015;for(let j=0;j<6;j++){ser+=c[j]/++y;}return -tmp+Math.log(2.5066282746310005*ser/z);}

// ── Init ──
renderTags();
</script>
